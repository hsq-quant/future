qwen:
  model: "qwen2.5-7b-instruct"
  api_key_env: "DASHSCOPE_API_KEY"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  timeout_seconds: 60
  prompt_version: "paper_appendix_a_v1_zh"

training:
  n_splits: 5
  n_trials: 20
  random_state: 42
  task: "regression"

artifacts:
  clean_articles_input: "data/intermediate/iterations/2026-03-28-english-v3-sample50/articles_archive_clean_english_sample50.parquet"
  full_clean_articles: "data/intermediate/iterations/2026-03-28-english-123-129-plus-2024-broader/articles_archive_clean_english.parquet"
  scored_articles: "data/processed/iterations/2026-03-28-english-v3-sample50/articles_scored.parquet"
  weekly_model_table: "data/processed/iterations/2026-03-28-english-v3-sample50/weekly_model_table.parquet"
  predictions: "data/processed/iterations/2026-03-28-english-v3-sample50/weekly_predictions.parquet"
  strategy: "data/processed/iterations/2026-03-28-english-v3-sample50/weekly_strategy.parquet"
  strategy_metrics: "reports/iterations/2026-03-28-english-v3-sample50/strategy_metrics.parquet"
  strategy_report: "reports/iterations/2026-03-28-english-v3-sample50/strategy_report.md"
  strategy_scenarios: "reports/iterations/2026-03-28-english-v3-sample50/strategy_scenarios.parquet"
  strategy_regimes: "reports/iterations/2026-03-28-english-v3-sample50/strategy_regimes.parquet"
  summary_report: "reports/iterations/2026-03-28-english-v3-sample50/summary.md"
  cv_metrics: "reports/iterations/2026-03-28-english-v3-sample50/cv_metrics.parquet"
  shap_dir: "reports/iterations/2026-03-28-english-v3-sample50"
