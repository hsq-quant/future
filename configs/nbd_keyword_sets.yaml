nbd_search:
  start_date: "2019-12-30"
  end_date: "2026-03-13"
  page_size: 50
  output: "data/raw/finnewshunter_exports/nbd_search_export_5k.csv"
  batches:
    - name: "broad"
      max_results_per_keyword: 1200
      keywords:
        - "原油"
        - "油价"
        - "国际油价"
        - "OPEC"
        - "欧佩克"
        - "原油期货"
        - "上海原油"
        - "上海国际能源交易中心"
        - "布伦特"
        - "WTI"
        - "减产"
        - "增产"
        - "能源"
        - "库存"
        - "供应"
        - "需求"
        - "炼厂"
        - "石油"
    - name: "longtail"
      max_results_per_keyword: 800
      keywords:
        - "原油库存"
        - "API原油库存"
        - "EIA原油库存"
        - "欧佩克+"
        - "页岩油"
        - "中东"
        - "红海"
        - "霍尔木兹"
        - "制裁"
        - "伊朗"
        - "俄罗斯石油"
        - "沙特原油"
        - "美油"
        - "布油"
        - "炼油"
        - "炼化"
        - "汽油"
        - "柴油"
        - "成品油"
        - "能源危机"
